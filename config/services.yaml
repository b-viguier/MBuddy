# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  env(DEV_HOST): 192.168.1.22
  dev_host: '%env(DEV_HOST)%'
  env(IPAD_HOST): 127.0.0.1
  ipad_host: '%env(IPAD_HOST)%'
  server_port: 8383
  mbuddy_base_path: !php/const Bveing\MBuddy\App\Controller\ServerController::MBUDDY_BASE_PATH
  synchronized_files:
    - 'composer.json'
    - 'composer.lock'
    - '.env'
    - 'phpwin.json'
    - 'src/'
    - 'public/'
    - 'config/'
    - 'templates/'
    - 'packages/'

imports:
  - { resource: services/ }

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true      # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  # add more service definitions when explicit configuration is needed
  # please note that last definitions always *replace* previous ones

  Bveing\MBuddy\App\Runtime\BackgroundService:
    public: true

  Bveing\MBuddy\Async\Server:
    public: true
    arguments:
      $port: '%server_port%'
      $uploadTmpDir: '%kernel.project_dir%/var/upload'

  Bveing\MBuddy\Infrastructure\App\Core\Preset\FileRepository:
    arguments:
      $filepath: '%kernel.project_dir%/var/presets.json'

  Bveing\MBuddy\App\ScoreStorage:
    arguments:
      $basePath: '%kernel.project_dir%/var/scores'

  Bveing\MBuddy\Motif\Master\Repository: '@mbuddy.motif.master.repository'

  mbuddy.motif.master.registry:
    stack:
      - Bveing\MBuddy\Infrastructure\App\Motif\Master\Registry\InMemoryCache:
      - Bveing\MBuddy\Infrastructure\App\Motif\Master\Registry\FileCache:
          $cacheDir: '%kernel.project_dir%/var/motif/'
      - Bveing\MBuddy\Infrastructure\App\Motif\Master\Registry\Motif: ~
  Bveing\MBuddy\App\Motif\Master\Registry: '@mbuddy.motif.master.registry'

  ## iPad connection
  Bveing\MBuddy\DevTools\ApiClient:
    arguments:
      $iPadHost: '%ipad_host%'
      $port: '%server_port%'

## Files synchronization
  Bveing\MBuddy\App\Controller\DevToolsController:
    arguments:
      $projectDir: '%kernel.project_dir%'
      $synchronizedFiles: '%synchronized_files%'

  Bveing\MBuddy\App\Command\RemoteSyncCommand:
    arguments:
      $projectDir: '%kernel.project_dir%'
      $synchronizedFiles: '%synchronized_files%'
