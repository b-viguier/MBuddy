name: mbuddy
services:
  php:
    build:
      context: ../
      dockerfile: docker/php/Dockerfile
    volumes:
      - ../:/usr/src/MBuddy
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    working_dir: /usr/src/MBuddy
    ports:
      - 8080:8080
      - 8383:8383
      - 8484:8484/udp
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      DEV_HOST: 127.0.0.1
      IPAD_HOST: 192.168.1.161

  node:
    build:
      context: node/
      dockerfile: Dockerfile
    working_dir: /usr/src/
    volumes:
      - ../:/usr/src/MBuddy
